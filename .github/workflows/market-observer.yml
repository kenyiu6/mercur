name: Market Observer

on:
  schedule:
    # Every 6 hours at :00 (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'Sony WH-1000XM5'
      platforms:
        description: 'Comma-separated platforms (carousell,facebook-marketplace,ebay)'
        required: false
        default: 'carousell'

jobs:
  observe:
    name: Observe market prices
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed for snapshot commit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run classifier
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_APP_SECRET: ${{ secrets.EBAY_APP_SECRET }}
        run: |
          QUERY="${{ github.event.inputs.query || 'Sony WH-1000XM5' }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          OUTPUT_DIR="tools/market-observer/snapshots"
          OUTPUT_FILE="${OUTPUT_DIR}/${TIMESTAMP}.json"
          LATEST_FILE="${OUTPUT_DIR}/latest.json"

          # Run observer → pipe to classifier CLI
          bun run tools/market-observer/index.ts 2>/dev/null \
            | bun run tools/market-observer/cli.ts \
                --query  "${QUERY}" \
                --output "${LATEST_FILE}"

          # Also write a timestamped snapshot
          cp "${LATEST_FILE}" "${OUTPUT_FILE}"

          echo "OUTPUT_FILE=${OUTPUT_FILE}" >> $GITHUB_ENV
          echo "LATEST_FILE=${LATEST_FILE}" >> $GITHUB_ENV

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-observer-snapshot-${{ github.run_number }}
          path: tools/market-observer/snapshots/latest.json
          retention-days: 30

      - name: Commit snapshot if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/market-observer/snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "chore(market-observer): snapshot $(date -u +"%Y-%m-%dT%H:%M:%SZ") [skip ci]"
            git push
          else
            echo "No snapshot changes — skipping commit."
          fi
