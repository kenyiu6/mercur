name: Market Observer

on:
  schedule:
    # Run every day at 09:00 HKT (01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'Sony WH-1000XM5'
      platforms:
        description: 'Comma-separated platforms (carousell,facebook-marketplace,ebay)'
        required: false
        default: 'carousell'

jobs:
  observe:
    name: Observe market prices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run market observer
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_APP_SECRET: ${{ secrets.EBAY_APP_SECRET }}
        run: |
          bun run tools/market-observer/index.ts
