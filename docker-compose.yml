version: '3.9'

# 香港炒賣 MVP — 本地一鍵啟動
#
# 用法：
#   1. cp .env.example .env，填入 PERPLEXITY_API_KEY（可選）
#   2. docker compose up -d --build
#   3. 等所有服務 healthy 後：
#      Backend API:  http://localhost:9000
#      Admin:        http://localhost:9000/app
#      Storefront:   http://localhost:3000/hk
#   4. 首次：docker compose exec backend npx medusa db:migrate
#      然後：docker compose exec backend npx medusa user -e admin@hk-flip.local -p supersecret
#      然後手動觸發一次 AI 抓取：
#         curl -X POST http://localhost:9000/admin/flip-listings/refresh \
#              -H "Authorization: Bearer <admin-token>"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mercur
      POSTGRES_PASSWORD: mercur
      POSTGRES_DB: mercur
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mercur']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://mercur:mercur@postgres:5432/mercur
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: ${STORE_CORS:-http://localhost:3000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:9000,http://localhost:5173}
      VENDOR_CORS: ${VENDOR_CORS:-http://localhost:5174}
      AUTH_CORS:   ${AUTH_CORS:-http://localhost:3000,http://localhost:5173,http://localhost:5174}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '9000:9000'
    command: ['sh', '-c', 'cd apps/api && npx medusa db:migrate && npx medusa start']

  storefront:
    build:
      context: .
      dockerfile: docker/storefront.Dockerfile
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_REGION: hk
      NEXT_PUBLIC_SITE_NAME: '香港炒賣市場'
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-pk_test_dummy}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-supersecret}
    ports:
      - '3000:3000'

volumes:
  pgdata:
