# Render Blueprint — 香港炒賣 MVP 一鍵部署
# 用法：在 Render dashboard 點 "New > Blueprint"，選此 repo，按提示完成
# Render 會自動建：Postgres + Redis + Backend Web + Storefront Web

databases:
  - name: hk-flip-postgres
    plan: free
    databaseName: mercur
    user: mercur

services:
  - type: redis
    name: hk-flip-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: hk-flip-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hk-flip-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hk-flip-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        sync: false      # 部署後填 storefront URL
      - key: ADMIN_CORS
        sync: false
      - key: VENDOR_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false      # 在 dashboard 手動填
      - key: STRIPE_API_KEY
        sync: false

  - type: web
    name: hk-flip-storefront
    runtime: docker
    dockerfilePath: ./docker/storefront.Dockerfile
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEDUSA_BACKEND_URL
        fromService:
          type: web
          name: hk-flip-backend
          property: hostport
      - key: NEXT_PUBLIC_MEDUSA_BACKEND_URL
        sync: false      # 填 backend public URL
      - key: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_KEY
        sync: false
      - key: NEXT_PUBLIC_DEFAULT_REGION
        value: hk
      - key: NEXT_PUBLIC_SITE_NAME
        value: 香港炒賣市場
      - key: REVALIDATE_SECRET
        generateValue: true
